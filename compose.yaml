name: skillmap

# ── How to use ────────────────────────────────────────────────────────────────
#  Dev  (auto-merges compose.override.yaml):
#    docker compose --env-file .env.dev up -d --build
#
#  Prod (explicit override):
#    docker compose -f compose.yaml -f compose.prod.yaml --env-file .env up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ---------------------------------------------------------------------------
  # MESSAGE BROKER – Confluent KRaft (no ZooKeeper needed)
  # ---------------------------------------------------------------------------
  kafka-broker:
    image: confluentinc/cp-kafka:latest
    ports:
      - "${KAFKA_EXTERNAL_PORT}:9092"
      - "${KAFKA_CONTROLLER_PORT}:9093"
    environment:
      KAFKA_NODE_ID: ${KAFKA_NODE_ID}
      KAFKA_BROKER_ID: ${KAFKA_BROKER_ID}
      KAFKA_PROCESS_ROLES: ${KAFKA_PROCESS_ROLES}
      KAFKA_CONTROLLER_QUORUM_VOTERS: ${KAFKA_CONTROLLER_QUORUM_VOTERS}
      KAFKA_LISTENERS: ${KAFKA_LISTENERS}
      KAFKA_ADVERTISED_LISTENERS: ${KAFKA_ADVERTISED_LISTENERS}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: ${KAFKA_LISTENER_SECURITY_PROTOCOL_MAP}
      KAFKA_CONTROLLER_LISTENER_NAMES: ${KAFKA_CONTROLLER_LISTENER_NAMES}
      KAFKA_INTER_BROKER_LISTENER_NAME: ${KAFKA_INTER_BROKER_LISTENER_NAME}
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: ${KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR}
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: ${KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS}
      KAFKA_DEFAULT_REPLICATION_FACTOR: ${KAFKA_DEFAULT_REPLICATION_FACTOR}
      KAFKA_MIN_INSYNC_REPLICAS: ${KAFKA_MIN_INSYNC_REPLICAS}
      KAFKA_TOPIC_AUTO_CREATE_ENABLE: ${KAFKA_TOPIC_AUTO_CREATE_ENABLE}
      KAFKA_HEAP_OPTS: ${KAFKA_HEAP_OPTS}
    networks:
      - skillmap-network
    volumes:
      - kafka-data:/var/lib/kafka/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${KAFKA_MEM_LIMIT}
        reservations:
          memory: ${KAFKA_MEM_RESERVATION}

  # ---------------------------------------------------------------------------
  # RELATIONAL DATABASE
  # ---------------------------------------------------------------------------
  core-db:
    image: postgres:15-alpine
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - skillmap-network
    volumes:
      - core-db-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # GRAPH DATABASE
  # ---------------------------------------------------------------------------
  roadmap-blueprints-db:
    image: neo4j:5.24
    ports:
      - "${NEO4J_HTTP_PORT}:7474"
      - "${NEO4J_BOLT_PORT}:7687"
    environment:
      NEO4J_AUTH: "${NEO4J_USER}/${NEO4J_PASSWORD}"
      NEO4J_server_memory_pagecache_size: ${NEO4J_PAGE_CACHE}
      NEO4J_server_memory_heap_initial__size: ${NEO4J_HEAP_INITIAL}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_MAX}
    networks:
      - skillmap-network
    volumes:
      - neo4j-data:/data
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # BACKEND – core service
  # ---------------------------------------------------------------------------
  core-service:
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: ${CORE_SERVICE_URLS}
      # ConnectionStrings
      ConnectionStrings__DefaultConnection: "Server=core-db;Database=${POSTGRES_DB};User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};"
      # JwtSettings
      JwtSettings__Secret: ${JWT_SECRET}
      JwtSettings__Issuer: ${JWT_ISSUER}
      JwtSettings__Audience: ${JWT_AUDIENCE}
      JwtSettings__ExpiryInMinutes: ${JWT_EXPIRY_IN_MINUTES}
      # EmailConfig
      EmailConfig__SmtpServer: ${EMAIL_SMTP_SERVER}
      EmailConfig__SmtpPort: ${EMAIL_SMTP_PORT}
      EmailConfig__SmtpUser: ${EMAIL_SMTP_USER}
      EmailConfig__SmtpPass: ${EMAIL_SMTP_PASS}
      EmailConfig__FromEmail: ${EMAIL_FROM_EMAIL}
      EmailConfig__FromName: ${EMAIL_FROM_NAME}
      # Neo4J
      Neo4J__Database: ${NEO4J_DATABASE}
      Neo4J__Username: ${NEO4J_USER}
      Neo4J__Password: ${NEO4J_PASSWORD}
      Neo4J__Server: bolt://roadmap-blueprints-db:7687
      # RoadmapTestingService
      RoadmapTestingService__BaseUrl: http://roadmap-tests-service:8080/
      # RoadmapWorkspaceActionConsumerOptions (Kafka)
      RoadmapWorkspaceActionConsumerOptions__BootstrapServers: kafka-broker:9092
      RoadmapWorkspaceActionConsumerOptions__TopicName: ${KAFKA_TOPIC_WORKSPACE_ACTIONS}
      RoadmapWorkspaceActionConsumerOptions__ConsumerGroup: ${KAFKA_CONSUMER_GROUP_WORKSPACE}
      RoadmapWorkspaceActionConsumerOptions__AutoOffsetResetEarliest: ${KAFKA_AUTO_OFFSET_RESET_EARLIEST}
      # WorkspaceActionReviewedProducerOptions (Kafka)
      WorkspaceActionReviewedProducerOptions__BootstrapServers: kafka-broker:9092
      WorkspaceActionReviewedProducerOptions__TopicName: ${KAFKA_TOPIC_ACTION_REVIEWED}
      # PasswordHashOptions
      PasswordHashOptions__SaltSize: ${PWD_HASH_SALT_SIZE}
      PasswordHashOptions__HashSize: ${PWD_HASH_HASH_SIZE}
      PasswordHashOptions__Iterations: ${PWD_HASH_ITERATIONS}
      PasswordHashOptions__MemorySize: ${PWD_HASH_MEMORY_SIZE}
      PasswordHashOptions__DegreeOfParallelism: ${PWD_HASH_PARALLELISM}
      # BuildRoadmapWorkspaceSnapshotWorker
      BuildRoadmapWorkspaceSnapshotWorker__ScheduleIntervalInMilliseconds: ${SNAPSHOT_WORKER_INTERVAL_MS}
    depends_on:
      core-db:
        condition: service_healthy
      roadmap-blueprints-db:
        condition: service_started
      kafka-broker:
        condition: service_started
    networks:
      - skillmap-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # BACKEND – roadmap tests service
  # ---------------------------------------------------------------------------
  roadmap-tests-service:
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: ${ROADMAP_TESTS_URLS}
      # OpenAI
      OpenAI__ApiKey: ${OPENAI_API_KEY}
      OpenAI__Model: ${OPENAI_MODEL}
      OpenAI__TimeoutSeconds: ${OPENAI_TIMEOUT_SECONDS}
      OpenAI__MaxOutputTokens: ${OPENAI_MAX_OUTPUT_TOKENS}
      # DatabaseConnection
      DatabaseConnection__Server: core-db
      DatabaseConnection__Database: ${POSTGRES_DB}
      DatabaseConnection__UserId: ${POSTGRES_USER}
      DatabaseConnection__Password: ${POSTGRES_PASSWORD}
      DatabaseConnection__Port: 5432
    depends_on:
      core-db:
        condition: service_healthy
    networks:
      - skillmap-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # BACKEND – roadmap workspace (WebSockets)
  # ---------------------------------------------------------------------------
  roadmap-workspace-service:
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: ${ROADMAP_WORKSPACE_URLS}
      # RoadmapWorkspaceActionProducerOptions (Kafka – producer)
      RoadmapWorkspaceActionProducerOptions__BootstrapServers: kafka-broker:9092
      RoadmapWorkspaceActionProducerOptions__TopicName: ${KAFKA_TOPIC_WORKSPACE_ACTIONS}
      # WorkspaceActionReviewedConsumerOptions (Kafka – consumer)
      WorkspaceActionReviewedConsumerOptions__BootstrapServers: kafka-broker:9092
      WorkspaceActionReviewedConsumerOptions__TopicName: ${KAFKA_TOPIC_ACTION_REVIEWED}
      WorkspaceActionReviewedConsumerOptions__ConsumerGroup: ${KAFKA_CONSUMER_GROUP_REVIEW}
      WorkspaceActionReviewedConsumerOptions__AutoOffsetResetEarliest: ${KAFKA_AUTO_OFFSET_RESET_EARLIEST}
    depends_on:
      kafka-broker:
        condition: service_started
    networks:
      - skillmap-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # BACKEND – gateway (YARP reverse proxy)
  # ---------------------------------------------------------------------------
  gateway:
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: ${GATEWAY_URLS}
      # JwtSettings (must match core-service secret for token validation)
      JwtSettings__Secret: ${JWT_SECRET}
      JwtSettings__Issuer: ${JWT_ISSUER}
      JwtSettings__Audience: ${JWT_AUDIENCE}
      JwtSettings__ExpiryInMinutes: ${JWT_EXPIRY_IN_MINUTES}
      # YARP – upstream addresses (override appsettings localhost defaults)
      ReverseProxy__Clusters__core__Destinations__core-instance-1__Address: http://core-service:8080
      ReverseProxy__Clusters__workspace-ws__Destinations__workspace-ws-instance-1__Address: http://roadmap-workspace-service:8080
    depends_on:
      - core-service
      - roadmap-tests-service
      - roadmap-workspace-service
    networks:
      - skillmap-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # FRONTEND – Next.js
  # ---------------------------------------------------------------------------
  frontend:
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
    expose:
      - "3000"
    depends_on:
      - gateway
    networks:
      - skillmap-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # REVERSE PROXY / LOAD BALANCER
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_HTTP_PORT}:80"
      - "${NGINX_HTTPS_PORT}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - gateway
    networks:
      - skillmap-network
    restart: unless-stopped

networks:
  skillmap-network:
    driver: bridge

volumes:
  kafka-data: {}
  core-db-data: {}
  neo4j-data: {}


