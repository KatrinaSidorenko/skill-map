name: build and push images to Docker Hub
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_call:
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push core-service image
        uses: docker/build-push-action@v3
        with:
          context: ./backend
          file: ./backend/core-service/Dockerfile
          push: true
          tags: | 
            ${{ secrets.DOCKER_USERNAME }}/skillmap_core-service:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/skillmap_core-service:latest
      - name: Build and push assessment-service image
        uses: docker/build-push-action@v3      
        with:
          context: ./backend
          file: ./backend/assessment-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/skillmap_assessment-service:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/skillmap_assessment-service:latest
      - name: Build and push workspace-service image
        uses: docker/build-push-action@v3
        with:
          context: ./backend
          file: ./backend/workspace-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/skillmap_workspace-service:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/skillmap_workspace-service:latest
      - name: Build and push gateway image
        uses: docker/build-push-action@v3
        with:
          context: ./backend
          file: ./backend/gateway/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/skillmap_gateway:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/skillmap_gateway:latest
      - name: Build and push frontend image
        uses: docker/build-push-action@v3
        with:
          context: ./frontend/skill-map
          file: ./frontend/skill-map/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/skillmap_frontend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/skillmap_frontend:latest