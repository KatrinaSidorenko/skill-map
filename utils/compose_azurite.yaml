version: '3.8'

services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: local-azurite
    ports:
      - "0.0.0.0:10000:10000" # Blob service
      - "0.0.0.0:10001:10001" # Queue service
      - "0.0.0.0:10002:10002" # Table service
    volumes:
      - azurite_data:/data
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --location /data --skipApiVersionCheck

volumes:
  azurite_data:
    driver: local